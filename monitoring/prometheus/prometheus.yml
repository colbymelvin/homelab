global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: "hass"
    scrape_interval: 60s
    metrics_path: /api/prometheus

    authorization:
      credentials_file: "/run/secrets/prometheus_home_assistant_token"

    scheme: http
    static_configs:
      - targets: ['homeassistant:8123']
